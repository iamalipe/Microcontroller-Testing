[env:esp32c3-sm-motor-l298]
platform  = espressif32
framework = arduino
board     = esp32-c3-devkitm-1
upload_speed  = 115200
monitor_speed = 115200
board_build.filesystem = littlefs
build_src_filter = +<motor_l298/*>
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
  mathieucarbou/ESPAsyncWebServer @ ^3.3.23
  mathieucarbou/AsyncTCP @ ^3.3.2


[env:esp32c3-sm-tft]
platform  = espressif32
framework = arduino
board     = esp32-c3-devkitm-1
upload_speed  = 115200
monitor_speed = 115200
build_src_filter = +<tft/*>
; TFT_eSPI config via build flags — no User_Setup.h editing needed
build_flags =
  -D USER_SETUP_LOADED=1
  -D ST7735_DRIVER=1
  -D TFT_WIDTH=128
  -D TFT_HEIGHT=160
  -D ST7735_REDTAB
  -D TFT_MOSI=6        ; GPIO6 = hardware MOSI
  -D TFT_SCLK=4        ; GPIO4 = hardware SCK
  -D TFT_CS=7          ; GPIO7 = hardware SS
  -D TFT_DC=3          ; GPIO3 = free GPIO, wire to RS/DC on display
  -D TFT_RST=-1        ; RST tied to 3.3V
  -D TFT_BL=-1
  -D SPI_FREQUENCY=27000000

lib_deps =
  bodmer/TFT_eSPI @ ^2.5.43


[env:esp32c3-sm-small-box]
platform  = espressif32
framework = arduino
board     = esp32-c3-devkitm-1
upload_speed  = 115200
monitor_speed = 115200
build_src_filter = +<small_box/*>
monitor_filters = esp32_exception_decoder
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.9
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:nodemcu-buzzer]
platform  = espressif8266
framework = arduino
board = nodemcu
upload_speed  = 115200
monitor_speed = 115200
build_src_filter = +<buzzer/*>
lib_deps =
  esphome/ESPAsyncTCP-esphome @ ^2.0.0
  mathieucarbou/ESPAsyncWebServer @ ^3.6.0


[env:esp32c3-sm-my-dev-board]
platform  = espressif32
framework = arduino
board     = esp32-c3-devkitm-1
upload_speed  = 115200
monitor_speed = 115200
